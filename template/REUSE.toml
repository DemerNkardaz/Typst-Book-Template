	This directory or files contains user-generated content.
	The license of this content is determined by the user
	and is NOT covered by the project license.
	"""

[[annotations]]
	path = [
		"code/package/index.typ",
		".vscode/**",
		".gitignore",
		".gitattributes",
		"REUSE.toml"
	]

	SPDX-FileCopyrightText = "NONE"
