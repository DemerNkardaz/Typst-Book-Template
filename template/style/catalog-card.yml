fields:
  - author
  - title
  - description
  - ISBN
  - Авторский знак
  - УДК
  - ББК

type: grid
grid-style:
  columns: [7.5mm, auto]
  rows: 3
  row-gutter: 10pt
  column-gutter: 5pt
  # stroke: rgb("#000000")
grid-items:
  - field: author
    row: 1
    col: 2
    style:
      text:
        weight: bold
  - field: title
    row: 2
    col: 2
    style:
      paragraph:
        first-line-indent:
          amount: 5mm
          all: true
      text:
        size: 9pt
  - field: ISBN
    row: 3
    col: 2
    style:
      paragraph:
        first-line-indent:
          amount: 5mm
          all: true
      text:
        size: 8pt
  - field: description
    row: 3
    col: 2
    style:
      text:
        size: 8pt
    margin:
      top: 4pt
      bottom: 4pt
  - field: Авторский знак
    row: 2
    col: 1
    style:
      text:
        size: 9pt
        weight: bold
  - table:
      table-width: 100%
      table-cell-style:
        size: 8pt
        weight: bold
      table-style:
        columns: [5fr, 1fr]
        rows: 2
        align: right
        inset: 4pt
        stroke: none
      table-items:
        - text: УДК
          row: 1
          col: 1
        - text: ББК
          row: 2
          col: 1
        - field: УДК
          row: 1
          col: 2
        - field: ББК
          row: 2
          col: 2
    row: 3
    col: 2

uses-style:
  paragraph: ""
  text: ""

style:
  width: 100%
  height: auto
  stroke: none
  radius: 2pt
  inset: 12pt
