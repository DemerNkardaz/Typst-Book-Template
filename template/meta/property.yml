    Акуцухара, смутное время «Гофун»…
    Здешние места всегда полнились опасностью, как и вся Нихонсимагуни.
    Где и как путник встретит свою судьбу? Меч врага? Копьё предателя? Когтисущностей ночных кошмаров? А быть может гнев богов?
    Многое переплелось вокруг большой деревушки, таящей древнюю силу.
    Силу, что всегда манила авантюристов и заключённую в «центральном столпе», вот уже более двух тысяч лет охранявшим людской покой у севера Акуцухары.
    Нобори Мицутакэ, «тиссовая синица» — воин глициниевой страны и дво-
    рянин из Момохары. Оказавшись в центре бедствий, что постигли эти земли, он вынужден взвалить на себя ответственность за их преодоление ради покоя дома и народа страны изобилующих берегов.
    Вместе с верными соратниками ему предстоит творить свершения, стол-
    кнуться лицом к лицу с ужасом иных миров да с монстрами, что с ликами
    людей и попытаться избежать касания руки, жадно тянущейся к нему пря-
    миком из царства Ёми
