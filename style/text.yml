font: Playfair Display
size: 10pt
hyphenate: auto
overhang: true
ligatures: true
costs:
  hyphenation: 40%
  runt: 100%
  widow: 200%
  orphan: 200%
historical-ligatures: true
kerning: true
number-type: lining
number-width: tabular
top-edge: x-height
bottom-edge: baseline

fill: cmyk(0%, 0%, 0%, 95%)
# fill: rgb(#000000)
